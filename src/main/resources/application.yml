spring:
  application:
    name: ai-agent
  profiles:
    active: client-stdio
  ai:
    # 阿里云-灵积模型服务 （与阿里云百炼的区别：必须通过底层编程去调用LLM）
    dashScope:
      api-key:
      chat:
        options:
          model: qwen-plus

#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: llama3.2:1b

    # Spring AI Alibaba 配置
    alibaba:
      document-reader:
        yuque:
          # 语雀 Token，从 https://www.yuque.com/settings/tokens 获取
          # 注意：生产环境请使用环境变量 YUQUE_TOKEN 配置
          token: xxx
        larksuite:
          # 飞书应用 App ID，从飞书开放平台获取
          # 路径：https://open.feishu.cn/ → 创建企业自建应用 → 凭证与基础信息
          # 注意：生产环境请使用环境变量 FEISHU_APP_ID 配置
          app-id: xxx
          # 飞书应用 App Secret，从飞书开放平台获取
          # 注意：生产环境请使用环境变量 FEISHU_APP_SECRET 配置
          app-secret: xxx
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi3
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zjw.controller
# Springboot3.X及以上版本必须使用OpenAPI3规范的knife4j，OpenAPI3规范依赖Springdoc项目
knife4j:
  enable: true
  setting:
    language: zh_cn

# 自定义敏感词配置
app:
  sensitive:
    # 敏感词库
    words:
      - 暴力
      - 色情
      - 赌博
      - 毒品
      - 恐怖主义
      - 违法
      - 犯罪
      - 反动
      - 邪教
      - 分裂
    # 是否启用敏感词检查
    enabled: true
    # 处理策略：BLOCK(拦截) / REPLACE(替换)
    strategy: BLOCK


# 翻译API配置
translation:
  # 是否启用翻译
  enabled: true
  # 翻译服务提供商：BAIDU(百度翻译) / YOUDAO(有道翻译) / DEEPL / CUSTOM(自定义)
  provider: BAIDU
  # 目标语言（默认翻译成英文以提高向量检索效果）
  target-language: zh
  # 百度翻译配置
  baidu:
    app-id: xxx
    app-key: xxx
  # 有道翻译配置
  youdao:
    app-key: xxx
    app-secret: xxx
  # DeepL配置
  deepl:
    api-key: xxx
    # deepL API端点（免费版: api-free.deepl.com, 专业版: api.deepl.com）
    endpoint: xxx


# searchApi
search-api:
  api-key: xxx

# 阿里云OSS配置
oss:
  aliyun:
    # OSS Endpoint（地域节点），如：oss-cn-hangzhou.aliyuncs.com
    endpoint: oss-cn-hangzhou.aliyuncs.com
    # AccessKey ID
    access-key-id: xxx
    # AccessKey Secret
    access-key-secret: xxx
    # Bucket名称
    bucket-name: xxx
    # PDF文件存储路径前缀
    pdf-path-prefix: pdf-files
