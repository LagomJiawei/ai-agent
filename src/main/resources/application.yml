spring:
  application:
    name: ai-agent
  ai:
    dashscope:
      api-key: 
      chat:
        options:
          model: qwen-plus
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: llama3.2:1b
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi3
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zjw.controller
# Springboot3.X及以上版本必须使用OpenAPI3规范的knife4j，OpenAPI3规范依赖Springdoc项目
knife4j:
  enable: true
  setting:
    language: zh_cn
